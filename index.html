<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera App</title>

    <!-- Estilos básicos -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Mi App 🚀</h1>

    <div class="container">
        <h2>Registro de Usuario</h2>

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="email" id="email" placeholder="Email">

        <button onclick="guardar()">Guardar</button>

        <h2>Lista de Usuarios</h2>
        <ul id="lista"></ul>
    </div>

    <!-- Conectar JS -->
    <script src="script.js"></script>

</body>
</html>
