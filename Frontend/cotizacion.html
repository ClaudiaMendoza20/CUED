<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUED - Cotizaciones</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.cot-table{width:100%;border-collapse:collapse;}
.cot-table th{background:rgba(255,255,255,0.03);padding:12px 16px;text-align:left;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.cot-table td{padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.04);}
.cot-table input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 12px;color:white;width:100%;font-size:13px;}
.cot-table input:focus{border-color:rgba(255,196,0,0.4);outline:none;}
.sub-cell{color:#ffc400;font-weight:600;font-size:14px;}
.btn-del{background:rgba(255,60,60,0.08);border:1px solid rgba(255,60,60,0.15);border-radius:6px;padding:5px 10px;color:#ff6b6b;cursor:pointer;font-size:12px;}
.btn-del:hover{background:rgba(255,60,60,0.2);}
.btn-add{background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.15);border-radius:10px;padding:12px;width:100%;color:rgba(255,255,255,0.4);cursor:pointer;font-size:13px;transition:all 0.2s;margin-top:12px;}
.btn-add:hover{background:rgba(255,196,0,0.06);border-color:rgba(255,196,0,0.3);color:#ffc400;}
.total-box{background:rgba(255,196,0,0.06);border:1px solid rgba(255,196,0,0.15);border-radius:16px;padding:28px;text-align:center;margin-top:24px;}
.total-box p{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:10px;}
.total-box h1{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;color:#ffc400;}
.total-box small{font-size:11px;color:rgba(255,255,255,0.2);display:block;margin-top:6px;}
.header-inputs{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
</style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main">
    <div class="page-header">
        <div class="page-title">
            <h1>📋 Generador de Cotizaciones</h1>
            <p>Elabora presupuestos técnicos con estándares corporativos.</p>
        </div>
        <button class="btn-primary" onclick="guardar()"><i class="fa fa-save"></i>Guardar Cotización</button>
    </div>

    <div id="alertSuccess" class="alert-success">✅ Cotización guardada en Supabase</div>
    <div id="alertError" class="alert-error">❌ Error al guardar</div>

    <div class="card">
        <div class="header-inputs">
            <div>
                <label>Nombre del Cliente / Empresa</label>
                <input id="cliente" placeholder="Ej: Ingeniería Global S.A. de C.V.">
            </div>
            <div>
                <label>Referencia del Proyecto</label>
                <input id="referencia" placeholder="Ej: Instalación Eléctrica Fase 1">
            </div>
        </div>

        <table class="cot-table">
            <thead>
                <tr>
                    <th>Descripción del Servicio / Material</th>
                    <th style="width:120px">Cantidad</th>
                    <th style="width:140px">Precio Unit.</th>
                    <th style="width:130px">Subtotal</th>
                    <th style="width:50px"></th>
                </tr>
            </thead>
            <tbody id="cotBody"></tbody>
        </table>

        <button class="btn-add" onclick="agregarItem()">
            <i class="fa fa-plus"></i> Agregar concepto
        </button>

        <div class="total-box">
            <p>Inversión Total Estimada</p>
            <h1 id="totalDisplay">$0</h1>
            <small>* Precios sujetos a cambios sin previo aviso.</small>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="sidebar.js"></script>
<script>
document.getElementById('sidebar-container').innerHTML = renderSidebar('cotizacion');

let items = [];
let nextId = 1;

function agregarItem(desc='', cant=1, precio=0) {
    items.push({ id: nextId++, desc, cant, precio });
    renderTabla();
}

function eliminarItem(id) {
    items = items.filter(i => i.id !== id);
    renderTabla();
}

function renderTabla() {
    const tbody = document.getElementById('cotBody');
    let total = 0;

    tbody.innerHTML = items.map((item, i) => {
        const sub = (parseFloat(item.cant)||0) * (parseFloat(item.precio)||0);
        total += sub;
        return `
        <tr>
            <td><input value="${item.desc}" placeholder="Descripción del servicio o material..." onchange="items[${i}].desc=this.value"></td>
            <td><input type="number" value="${item.cant}" min="1" onchange="items[${i}].cant=this.value;renderTabla()" oninput="items[${i}].cant=this.value;renderTabla()"></td>
            <td><input type="number" value="${item.precio}" min="0" step="0.01" onchange="items[${i}].precio=this.value;renderTabla()" oninput="items[${i}].precio=this.value;renderTabla()"></td>
            <td class="sub-cell">$${sub.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
            <td><button class="btn-del" onclick="eliminarItem(${item.id})"><i class="fa fa-trash"></i></button></td>
        </tr>`;
    }).join('');

    document.getElementById('totalDisplay').textContent = '$' + total.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function guardar() {
    const cliente = document.getElementById('cliente').value.trim();
    const referencia = document.getElementById('referencia').value.trim();
    if(!cliente) { alert('Ingresa el nombre del cliente'); return; }
    if(!items.length) { alert('Agrega al menos un concepto'); return; }

    const total = items.reduce((s, i) => s + (parseFloat(i.cant)||0) * (parseFloat(i.precio)||0), 0);

    try {
        // Guardar cotización
        const cotiz = await sbFetch('cotizaciones', {
            method: 'POST',
            body: { cliente, referencia, total }
        });

        const cotizId = cotiz[0]?.id;

        // Guardar items
        if(cotizId) {
            for(const item of items) {
                await sbFetch('cotizaciones_items', {
                    method: 'POST',
                    body: {
                        cotizacion_id: cotizId,
                        descripcion: item.desc || 'Servicio',
                        cantidad: parseFloat(item.cant) || 1,
                        precio_unitario: parseFloat(item.precio) || 0
                    }
                });
            }
        }

        const s = document.getElementById('alertSuccess');
        s.style.display = 'block';
        setTimeout(()=>s.style.display='none', 4000);

    } catch(err) {
        console.error(err);
        const e = document.getElementById('alertError');
        e.style.display = 'block';
        setTimeout(()=>e.style.display='none', 4000);
    }
}

// Item inicial de ejemplo
agregarItem('Consultoría Técnica Especializada', 1, 2500);
</script>
</body>
</html>
