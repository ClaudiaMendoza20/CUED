<div class="main">

<div class="title">

<h1>⚡ Cálculos Eléctricos</h1>
<div class="subtitle">Dimensionamiento de alimentadores y protecciones</div>

</div>

<div class="grid">

<!-- PARAMETROS -->

<div class="card">

<h3>Parámetros de Diseño</h3>

<label>Carga total (Watts)</label>
<input id="carga" value="5000">

<label>Voltaje (V)</label>
<select id="voltaje">
<option value="127">127 V</option>
<option value="220" selected>220 V</option>
<option value="440">440 V</option>
</select>

<label>Fases</label>
<select id="fases">
<option value="1">Monofásico</option>
<option value="3">Trifásico</option>
</select>

<button onclick="calcular()">Calcular</button>

</div>

<!-- RESULTADO -->

<div class="card result">

<p>Corriente de diseño</p>

<h1 id="corriente">0 A</h1>

<div class="boxes">

<div class="box">
<p>Calibre sugerido</p>
<h3 id="awg">-</h3>
</div>

<div class="box">
<p>Protección</p>
<h3 id="breaker">-</h3>
</div>

</div>

</div>

</div>

</div>

<script>

function calcular(){

let carga=parseFloat(document.getElementById("carga").value)
let voltaje=parseFloat(document.getElementById("voltaje").value)
let fases=parseInt(document.getElementById("fases").value)

let corriente

/* FORMULA ELECTRICA */

if(fases==1){

corriente=carga/voltaje

}else{

corriente=carga/(voltaje*Math.sqrt(3))

}

corriente=corriente*1.25

corriente=corriente.toFixed(2)

document.getElementById("corriente").innerText=corriente+" A"

/* CALIBRE AWG */

let awg="14 AWG"

if(corriente>15) awg="12 AWG"
if(corriente>20) awg="10 AWG"
if(corriente>30) awg="8 AWG"
if(corriente>40) awg="6 AWG"
if(corriente>55) awg="4 AWG"
if(corriente>70) awg="3 AWG"
if(corriente>85) awg="2 AWG"

document.getElementById("awg").innerText=awg

/* BREAKER */

let breaker=Math.ceil(corriente/10)*10

document.getElementById("breaker").innerText="1x"+breaker+"A"

guardar(carga,voltaje,fases,corriente,awg,breaker)

}

/* GUARDAR EN BD */

async function guardar(carga,voltaje,fases,corriente,awg,breaker){

await fetch("/api/electrico",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
carga,
voltaje,
fases,
corriente,
awg,
breaker
})

})

}

</script>
