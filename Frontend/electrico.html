<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUED - Eléctrico</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.result-card{
    background:#0f1f38;
    border:1px solid rgba(0,212,255,0.15);
    border-radius:16px;
    padding:28px;
    text-align:center;
}
.result-big{
    font-family:'Rajdhani',sans-serif;
    font-size:72px;
    font-weight:700;
    color:#5fa8ff;
    line-height:1;
}
.result-unit{font-size:22px;color:rgba(95,168,255,0.6);}
.hist-scroll{max-height:260px;overflow-y:auto;}
.hist-scroll::-webkit-scrollbar{width:4px;}
.hist-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:99px;}
</style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main">
    <div class="page-header">
        <div class="page-title">
            <h1>⚡ Cálculos Eléctricos</h1>
            <p>Dimensionamiento de alimentadores y protecciones.</p>
        </div>
    </div>

    <div class="calc-grid">

        <!-- PARÁMETROS -->
        <div class="card">
            <h3>Parámetros de Diseño</h3>

            <label>Carga Total (Watts)</label>
            <input id="carga" type="number" value="5000" placeholder="Watts" min="1">

            <label>Voltaje (V)</label>
            <select id="voltaje">
                <option value="127">127 V — Monofásico residencial</option>
                <option value="220" selected>220 V</option>
                <option value="440">440 V — Industrial trifásico</option>
            </select>

            <label>Tipo de Sistema</label>
            <select id="fases">
                <option value="1">Monofásico</option>
                <option value="3">Trifásico</option>
            </select>

            <label>Factor de Demanda</label>
            <select id="factor">
                <option value="1.25" selected>1.25 — NOM estándar</option>
                <option value="1.0">1.0 — Sin factor</option>
                <option value="1.5">1.5 — Alta demanda</option>
            </select>

            <div style="margin-top:24px;display:flex;gap:12px;">
                <button class="btn-primary" onclick="calcular()" style="flex:1">
                    <i class="fa fa-calculator"></i> Calcular
                </button>
                <button class="btn-secondary" id="btnGuardar" onclick="guardar()">
                    <i class="fa fa-save"></i> Guardar
                </button>
            </div>

            <div id="alertSuccess" class="alert-success" style="margin-top:12px;display:none">
                ✅ Guardado correctamente en Supabase
            </div>
            <div id="alertError" class="alert-error" style="margin-top:12px;display:none">
                ❌ Error al guardar — revisa consola (F12)
            </div>
        </div>

        <!-- RESULTADO -->
        <div class="result-card">
            <div class="result-label">Corriente de Diseño</div>
            <div class="result-big" id="corriente">
                —<span class="result-unit"> A</span>
            </div>

            <div class="mini-cards" style="margin-top:28px">
                <div class="mini-card">
                    <div class="mini-label">Calibre Sugerido</div>
                    <div class="mini-val" id="awg">—</div>
                </div>
                <div class="mini-card">
                    <div class="mini-label">Protección</div>
                    <div class="mini-val" id="breaker">—</div>
                </div>
                <div class="mini-card">
                    <div class="mini-label">Conduit</div>
                    <div class="mini-val" id="conduit">—</div>
                </div>
            </div>
        </div>

    </div>

    <!-- HISTORIAL -->
    <div class="card" style="margin-top:24px">
        <h3>Historial de Cálculos</h3>
        <div class="hist-scroll" id="historial">
            <div class="empty-state">Cargando historial...</div>
        </div>
    </div>

</div>

<script src="config.js"></script>
<script src="sidebar.js"></script>
<script>

// Sidebar
document.getElementById('sidebar-container').innerHTML = renderSidebar('electrico');

// Keys de Supabase directas para evitar cualquier problema con config.js
const SB_URL = 'https://tazheiutbleaexmcsopy.supabase.co/rest/v1';
const SB_KEY = 'sb_publishable_i5hoZ9cKYlksVhpMcee_-Q_LQes-FOK';
const SB_HEADERS = {
    'Content-Type':  'application/json',
    'apikey':        SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Prefer':        'return=representation'
};

let ultimoCalculo = null;

// ─── CALCULAR ────────────────────────────────────────────────
function calcular() {
    const carga   = parseFloat(document.getElementById('carga').value);
    const voltaje = parseFloat(document.getElementById('voltaje').value);
    const fases   = parseInt(document.getElementById('fases').value);
    const factor  = parseFloat(document.getElementById('factor').value);

    if (!carga || carga <= 0) return;

    // Fórmula eléctrica
    let I = fases === 1
        ? carga / voltaje
        : carga / (voltaje * Math.sqrt(3));
    I = I * factor;

    // Calibre AWG — NOM-001-SEDE-2012
    let awg = '14 AWG';
    if (I > 15)  awg = '12 AWG';
    if (I > 20)  awg = '10 AWG';
    if (I > 30)  awg = '8 AWG';
    if (I > 40)  awg = '6 AWG';
    if (I > 55)  awg = '4 AWG';
    if (I > 70)  awg = '2 AWG';
    if (I > 95)  awg = '1/0 AWG';
    if (I > 125) awg = '2/0 AWG';
    if (I > 150) awg = '3/0 AWG';
    if (I > 200) awg = '4/0 AWG';

    // Breaker NEMA estándar
    const breakerStd = [15,20,25,30,40,50,60,70,80,90,100,125,150,175,200,225,250,300,350,400];
    const breakerVal = breakerStd.find(b => b >= I) || 400;
    const breakerStr = '1x' + breakerVal + 'A';

    // Conduit EMT
    let conduit = '3/4"';
    if (I > 30)  conduit = '1"';
    if (I > 60)  conduit = '1 1/4"';
    if (I > 100) conduit = '1 1/2"';
    if (I > 150) conduit = '2"';

    // Mostrar resultados
    document.getElementById('corriente').innerHTML =
        I.toFixed(2) + '<span class="result-unit"> A</span>';
    document.getElementById('awg').textContent     = awg;
    document.getElementById('breaker').textContent = breakerStr;
    document.getElementById('conduit').textContent = conduit;

    // Objeto listo para Supabase — nombres exactos de columnas
    ultimoCalculo = {
        carga:     carga,
        voltaje:   voltaje,
        fases:     fases,
        factor:    factor,
        corriente: I.toFixed(2),
        awg:       awg,
        breaker:   breakerStr,
        conduit:   conduit
    };
}

// ─── GUARDAR EN SUPABASE ─────────────────────────────────────
async function guardar() {
    if (!ultimoCalculo) {
        calcular();
    }
    if (!ultimoCalculo) {
        alert('Primero realiza un cálculo');
        return;
    }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Guardando...';

    try {
        const res = await fetch(SB_URL + '/calculos_electricos', {
            method:  'POST',
            headers: SB_HEADERS,
            body:    JSON.stringify(ultimoCalculo)
        });

        if (!res.ok) {
            const txt = await res.text();
            console.error('❌ Supabase respondió:', res.status, txt);
            throw new Error('Status ' + res.status + ': ' + txt);
        }

        const saved = await res.json();
        console.log('✅ Guardado en Supabase:', saved);

        mostrarAlerta('success');
        cargarHistorial();

    } catch (err) {
        console.error('Error guardar electrico:', err);
        mostrarAlerta('error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-save"></i> Guardar';
    }
}

// ─── HISTORIAL ───────────────────────────────────────────────
async function cargarHistorial() {
    const div = document.getElementById('historial');
    try {
        const res = await fetch(
            SB_URL + '/calculos_electricos?order=created_at.desc&limit=15',
            { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
        );

        if (!res.ok) throw new Error('Error ' + res.status);
        const data = await res.json();

        if (!Array.isArray(data) || !data.length) {
            div.innerHTML = '<div class="empty-state">No hay cálculos guardados aún</div>';
            return;
        }

        div.innerHTML = data.map(c => `
            <div class="hist-item">
                ⚡ <strong>${c.carga} W</strong> /
                ${c.voltaje} V /
                ${parseInt(c.fases) === 1 ? 'Monofásico' : 'Trifásico'} /
                FD: ${c.factor} →
                <strong>${c.corriente} A</strong> |
                ${c.awg} | ${c.breaker} | Conduit ${c.conduit}
            </div>
        `).join('');

    } catch (err) {
        console.error('Error historial:', err);
        div.innerHTML = '<div class="empty-state">Error al cargar historial</div>';
    }
}

// ─── HELPER ALERTAS ──────────────────────────────────────────
function mostrarAlerta(tipo) {
    const s = document.getElementById('alertSuccess');
    const e = document.getElementById('alertError');
    s.style.display = 'none';
    e.style.display = 'none';
    if (tipo === 'success') {
        s.style.display = 'block';
        setTimeout(() => { s.style.display = 'none'; }, 3500);
    } else {
        e.style.display = 'block';
        setTimeout(() => { e.style.display = 'none'; }, 4000);
    }
}

// ─── EVENTOS ────────────────────────────────────────────────
['carga', 'voltaje', 'fases', 'factor'].forEach(id => {
    document.getElementById(id).addEventListener('change', calcular);
    document.getElementById(id).addEventListener('input',  calcular);
});

// ─── INICIO ──────────────────────────────────────────────────
calcular();
cargarHistorial();

</script>
</body>
</html>
